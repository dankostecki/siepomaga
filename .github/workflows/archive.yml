name: Daily Firestore Archive

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 23:00 CET (winter) / 00:00 CEST (summer)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Fetch and save snapshot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/archive.js

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          git diff --staged --quiet || git commit -m "archive: $(date -u '+%Y-%m-%d')"
          git push
